<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sensor Log Visualiser</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Helvetica,Arial,sans-serif;
background:#f5f7fb;
}

#viewer{
position:absolute;
top:60px;
left:0;
right:0;
bottom:0;
}

#map{
height:100%;
width:100%;
}

#chartContainer{
height:100%;
width:100%;
display:none;
padding:20px;
background:#ffffff;
}

#chart{
width:100%;
height:100%;
}

#tabs{
position:absolute;
top:0;
left:0;
right:0;
height:60px;
display:flex;
align-items:end;
background:#e5e7eb;
padding-left:10px;
}

.tab{
background:#d1d5db;
padding:12px 24px;
margin-right:4px;
border-top-left-radius:8px;
border-top-right-radius:8px;
cursor:pointer;
font-size:16px;
}

.tab.active{
background:#2563eb;
color:white;
font-weight:bold;
}

#ui{
position:absolute;
top:70px;
left:15px;
background:white;
padding:16px;
border-radius:10px;
box-shadow:0 6px 25px rgba(0,0,0,0.15);
z-index:1000;
width:280px;
}

#variables label{
display:block;
margin-bottom:8px;
font-size:15px;
}

input[type=file]{
width:100%;
font-size:15px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div id="tabs">

<div class="tab active" id="tabMap">Map</div>
<div class="tab" id="tabGraph">Graph</div>

</div>

<div id="viewer">

<div id="map"></div>

<div id="chartContainer">
<canvas id="chart"></canvas>
</div>

</div>

<div id="ui">

<strong>Sensor Log</strong><br><br>

<input type="file" id="csvFile" accept=".csv,.txt">

<div id="variables"></div>

</div>

<script>

let map=L.map('map');
let markersLayer=L.layerGroup().addTo(map);

let data=[];
let activeVariable=null;

let latField="lat";
let lonField="lon";
let timeField=null;

let chart=null;

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{attribution:'© OpenStreetMap contributors'}
).addTo(map);



function activateTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

tab.classList.add("active");

if(tab.id==="tabMap"){

document.getElementById("map").style.display="block";
document.getElementById("chartContainer").style.display="none";
map.invalidateSize();

}

if(tab.id==="tabGraph"){

document.getElementById("map").style.display="none";
document.getElementById("chartContainer").style.display="block";
drawGraph();

}

}

document.getElementById("tabMap").onclick=function(){activateTab(this)};
document.getElementById("tabGraph").onclick=function(){activateTab(this)};



document.getElementById("csvFile").addEventListener("change",e=>{

const file=e.target.files[0];

Papa.parse(file,{
header:true,
dynamicTyping:true,
skipEmptyLines:true,
transformHeader:h=>h.trim(),

complete:res=>{

const rows=res.data;

if(rows.length===0){
alert("File empty");
return;
}

const keys=Object.keys(rows[0]);

const lower=keys.map(k=>k.toLowerCase());

if(lower.includes("lat"))latField="lat";
if(lower.includes("latitude"))latField="latitude";

if(lower.includes("lon"))lonField="lon";
if(lower.includes("longitude"))lonField="longitude";

if(lower.includes("gps_time"))timeField="gps_time";
else if(lower.includes("rtc_time"))timeField="rtc_time";
else if(lower.includes("time_s"))timeField="time_s";

data=rows.filter(r=>
typeof r[latField]==="number" &&
typeof r[lonField]==="number"
);

if(data.length===0){
alert("No valid lat/lon data");
return;
}

buildVariableList();
zoomToCSV();

}

});

});



function buildVariableList(){

const container=document.getElementById("variables");

container.innerHTML="<strong>Variable</strong><br><br>";

const ignore=[latField,lonField,timeField];

Object.keys(data[0]).forEach(key=>{

if(ignore.includes(key))return;
if(typeof data[0][key]!=="number")return;

const label=document.createElement("label");

label.innerHTML=`
<input type="radio" name="variable" value="${key}">
${key}
`;

label.querySelector("input").addEventListener("change",()=>{
activeVariable=key;
plotMarkers();
drawGraph();
});

container.appendChild(label);

});

}



function zoomToCSV(){

const bounds=L.latLngBounds(data.map(d=>[d[latField],d[lonField]]));

map.fitBounds(bounds,{padding:[40,40]});

}



function plotMarkers(){

markersLayer.clearLayers();

if(!activeVariable)return;

const values=data.map(d=>d[activeVariable]);

const minV=Math.min(...values);
const maxV=Math.max(...values);

data.forEach(d=>{

const t=(d[activeVariable]-minV)/(maxV-minV||1);

const color=getColor(t);

let popup="";

Object.keys(d).forEach(k=>{
popup+=`<b>${k}</b>: ${d[k]}<br>`;
});

const marker=L.circleMarker(
[d[latField],d[lonField]],
{
radius:6,
color,
fillColor:color,
fillOpacity:0.9
}
).bindPopup(popup);

markersLayer.addLayer(marker);

});

}



function drawGraph(){

if(!activeVariable)return;

const labels=data.map(d=>d[timeField] ?? "");

const values=data.map(d=>d[activeVariable]);

const ctx=document.getElementById("chart");

if(chart)chart.destroy();

chart=new Chart(ctx,{
type:"line",

data:{
labels:labels,
datasets:[{
label:activeVariable,
data:values,
borderWidth:3,
pointRadius:0,
tension:0.2
}]
},

options:{
responsive:true,
maintainAspectRatio:false,

plugins:{
legend:{display:true}
},

scales:{
x:{
title:{display:true,text:timeField ?? "index"}
},
y:{
title:{display:true,text:activeVariable}
}
}

}

});

}



function getColor(t){

const hue=240-240*t;

return `hsl(${hue},100%,45%)`;

}

</script>

</body>
</html>
