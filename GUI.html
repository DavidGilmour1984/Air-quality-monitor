<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sensor Log Visualiser</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --ink:#0f172a;
  --muted:#64748b;
  --accent:#2563eb;
  --accentDark:#1e40af;
  --border:#e2e8f0;
  --shadow:0 10px 30px rgba(2,6,23,0.12);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
  overflow:hidden;
}

#topbar{
  position:absolute;
  top:0; left:0; right:0;
  height:64px;
  background:rgba(255,255,255,0.86);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  z-index:2000;
}

#brand{display:flex;flex-direction:column;line-height:1.05}
#brand strong{font-size:16px}
#brand span{font-size:12px;color:var(--muted)}

#viewTabs{display:flex;gap:8px;align-items:center}

.seg{
  display:flex;
  background:#eef2ff;
  border:1px solid #dbeafe;
  border-radius:12px;
  padding:4px;
  gap:4px;
}
.seg button{
  border:0;
  background:transparent;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
}
.seg button.active{
  background:var(--accent);
  color:white;
}

#openPanelBtn{
  border:1px solid var(--border);
  background:white;
  padding:10px 12px;
  border-radius:12px;
  cursor:pointer;
}

#stage{
  position:absolute;
  top:64px; left:0; right:0; bottom:0;
}

#mapView,#graphView{
  position:absolute;
  top:0; left:0; right:0; bottom:0;
}

#graphView{display:none;background:white}

#map{height:100%;width:100%}

#graphWrap{
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  padding:18px;
}

#graphCard{
  height:100%;
  width:100%;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

#graphHead{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
}

#chartArea{
  position:relative;
  flex:1;
  padding:10px;
}

#chart{
  width:100%!important;
  height:100%!important;
}

#drawer{
  position:absolute;
  top:64px;
  left:0;
  bottom:0;
  width:min(360px,92vw);
  background:var(--card);
  border-right:1px solid var(--border);
  transform:translateX(-110%);
  transition:transform .25s;
  z-index:2500;
  display:flex;
  flex-direction:column;
}

#drawer.open{transform:translateX(0)}

#drawerHeader{
  padding:14px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}

#drawerBody{
  padding:14px;
  overflow:auto;
}

.block{
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
}

#variables{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.radioRow{
  display:flex;
  gap:10px;
  align-items:center;
  padding:10px;
  border:1px solid #e2e8f0;
  border-radius:14px;
  background:white;
  cursor:pointer;
}

#legendBox{
  position:absolute;
  right:16px;
  bottom:16px;
  z-index:1200;
  background:rgba(255,255,255,0.92);
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:var(--shadow);
  padding:12px;
  width:220px;
}

#legendBar{
  height:14px;
  width:100%;
  border-radius:10px;
  background:linear-gradient(to right,blue,cyan,lime,yellow,red);
  margin-bottom:6px;
}

#legendScale{
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

</style>
</head>

<body>

<div id="topbar">
<div id="brand">
<strong>Sensor Log Visualiser</strong>
</div>

<div id="viewTabs">
<div class="seg">
<button id="btnMap" class="active">Map</button>
<button id="btnGraph">Graph</button>
</div>
<button id="openPanelBtn">Controls</button>
</div>
</div>

<div id="stage">

<div id="mapView">
<div id="map"></div>

<div id="legendBox">
<div id="legendTitle">Variable</div>
<div id="legendBar"></div>
<div id="legendScale">
<span id="legendMin">0</span>
<span id="legendMax">1</span>
</div>
</div>

</div>

<div id="graphView">
<div id="graphWrap">
<div id="graphCard">
<div id="graphHead">
<strong id="graphTitle">Graph</strong>
</div>
<div id="chartArea">
<canvas id="chart"></canvas>
</div>
</div>
</div>
</div>

</div>

<div id="drawer">
<div id="drawerHeader">
<strong>Controls</strong>
<button id="closeBtn">×</button>
</div>

<div id="drawerBody">

<div class="block">
<h3>Load file</h3>
<input type="file" id="csvFile">
<div id="statusLine">No file loaded</div>
</div>

<div class="block">
<h3>Colour / Graph variable</h3>
<div id="variables"></div>
</div>

</div>
</div>

<script>

let map=L.map('map');
let markersLayer=L.layerGroup().addTo(map);

let data=[];
let activeVariable=null;

let latField="lat";
let lonField="lon";

let chart=null;
let minValue=0;
let maxValue=1;

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ attribution:'© OpenStreetMap contributors'}
).addTo(map);

/* ---------- drawer ---------- */

const drawer=document.getElementById("drawer");

document.getElementById("openPanelBtn").onclick=()=>drawer.classList.add("open");
document.getElementById("closeBtn").onclick=()=>drawer.classList.remove("open");

drawer.classList.add("open");

/* ---------- view ---------- */

function setView(v){

if(v==="map"){
document.getElementById("mapView").style.display="block";
document.getElementById("graphView").style.display="none";
map.invalidateSize();
}else{
document.getElementById("mapView").style.display="none";
document.getElementById("graphView").style.display="block";
drawGraph();
}

}

btnMap.onclick=()=>setView("map");
btnGraph.onclick=()=>setView("graph");

/* ---------- distance ---------- */

function haversine(lat1,lon1,lat2,lon2){

const R=6371000;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

/* ---------- rolling speed ---------- */

function computeSpeed(){

let window=[];

for(let i=0;i<data.length;i++){

if(i===0){
data[i].speed_kmh=0;
continue;
}

let d=haversine(
data[i-1][latField],
data[i-1][lonField],
data[i][latField],
data[i][lonField]
);

let speed=d*3.6;

window.push(speed);

if(window.length>10)window.shift();

let avg=window.reduce((a,b)=>a+b,0)/window.length;

data[i].speed_kmh=avg;

}

}

/* ---------- file load ---------- */

csvFile.addEventListener("change",e=>{

let file=e.target.files[0];
if(!file)return;

Papa.parse(file,{
header:true,
dynamicTyping:true,
skipEmptyLines:true,
complete:res=>{

data=res.data.filter(r=>typeof r.lat==="number");

computeSpeed();

buildVariableList();
zoomToData();

statusLine.innerText=`Loaded ${data.length} rows`;

}
});

});

/* ---------- variables ---------- */

function buildVariableList(){

variables.innerHTML="";

let keys=Object.keys(data[0]);

keys.forEach(k=>{

if(typeof data[0][k]!=="number")return;

let row=document.createElement("label");
row.className="radioRow";

row.innerHTML=`
<input type="radio" name="var" value="${k}">
<span>${k}</span>
`;

row.onclick=()=>{
selectVariable(k);
row.querySelector("input").checked=true;
};

variables.appendChild(row);

});

}

/* ---------- select variable ---------- */

function selectVariable(k){

activeVariable=k;

plotMarkers();
drawGraph();

}

/* ---------- map ---------- */

function zoomToData(){

let bounds=L.latLngBounds(data.map(d=>[d.lat,d.lon]));
map.fitBounds(bounds);

}

function plotMarkers(){

markersLayer.clearLayers();

let values=data.map(d=>d[activeVariable]);

minValue=Math.min(...values);
maxValue=Math.max(...values);

data.forEach(d=>{

let v=d[activeVariable];

let t=(v-minValue)/(maxValue-minValue||1);

let color=getColor(t);

let marker=L.circleMarker(
[d.lat,d.lon],
{radius:6,color,fillColor:color,fillOpacity:0.9}
);

markersLayer.addLayer(marker);

});

}

/* ---------- graph ---------- */

function drawGraph(){

if(!activeVariable)return;

let labels=data.map((_,i)=>i);
let values=data.map(d=>d[activeVariable]);

let ctx=document.getElementById("chart");

if(chart)chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:activeVariable,
data:values,
borderWidth:3,
pointRadius:0
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

}

/* ---------- colour ---------- */

function getColor(t){

let hue=240-240*t;
return `hsl(${hue},100%,45%)`;

}

</script>

</body>
</html>
